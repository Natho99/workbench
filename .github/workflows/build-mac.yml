name: Build, Package, and Capture UI

on: 
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build-capture:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas numpy openpyxl Pillow 
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run PyInstaller
        run: |
          pyinstaller main.py \
            --name "4G_WORKBENCH" \
            --windowed \
            --noconfirm \
            --clean \
            --icon="app.icns" \
            --add-data "app.icns:." \
            --add-data "LICENSE.txt:."

      - name: Create .pkg Installer
        run: |
          pkgbuild --component "dist/4G_WORKBENCH.app" \
            --install-location "/Applications" \
            "dist/4G_WORKBENCH_Installer.pkg"

      - name: Install and Fix Permissions
        run: |
          sudo installer -pkg "dist/4G_WORKBENCH_Installer.pkg" -target /
          sudo xattr -rd com.apple.quarantine "/Applications/4G_WORKBENCH.app" || true

      - name: Launch, Automate, and Screenshot Pages
        run: |
          echo "Starting the app..."
          /Applications/4G_WORKBENCH.app/Contents/MacOS/4G_WORKBENCH > app_errors.txt 2>&1 &
          
          # Initial wait for GUI initialization
          sleep 45
          
          echo "Automating Page Navigation via AppleScript..."
          osascript <<EOT
            tell application "System Events"
              tell process "4G_WORKBENCH"
                set frontmost to true
                delay 2
                
                # 1. Set Fullscreen
                try
                  set value of attribute "AXFullScreen" of window 1 to true
                end try
                delay 10
                
                # NAVIGATION LOGIC:
                # Based on the UI, we tab to reach the top-right icons.
                # Adjust the 'repeat' counts if focus behavior changes.

                # Page 1: Reconcile (Usually the first button in that group)
                repeat 2 times
                  keystroke tab
                end repeat
                keystroke return
                delay 5
                do shell script "screencapture -x screenshot_reconcile.png"

                # Page 2: Notes (Next button)
                keystroke tab
                keystroke return
                delay 5
                do shell script "screencapture -x screenshot_notes.png"

                # Page 3: Settings (Final button)
                keystroke tab
                keystroke return
                delay 5
                do shell script "screencapture -x screenshot_settings.png"
              end tell
            end tell
          EOT
          
          echo "--- DEBUG: APP OUTPUT/ERRORS ---"
          cat app_errors.txt || echo "No logs found"

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: 4G-Workbench-MultiPage-Screenshots
          path: |
            screenshot_reconcile.png
            screenshot_notes.png
            screenshot_settings.png
            dist/4G_WORKBENCH_Installer.pkg
            app_errors.txt
