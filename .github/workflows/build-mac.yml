name: Build macOS Installer
on: 
  push:
    branches: [ main ]

jobs:
  macos-build:
    runs-on: macos-latest
    env:
      # Opt into the newer Node.js runtime to remove the deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # v4 is actually still fine, but the env var above clears the warning

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          brew install create-dmg

      - name: Run PyInstaller
        run: |
          pyinstaller main.py \
            --name "4G_WORKBENCH" \
            --onefile \
            --windowed \
            --icon=app.icns \
            --add-data "app.icns:." \
            --add-data "LICENSE.txt:." \
            --clean

      - name: Create DMG Installer
        run: |
          create-dmg \
            --volname "4G WORKBENCH" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "4G_WORKBENCH.dmg" \
            "dist/"

      - name: Upload DMG as Artifact
        uses: actions/upload-artifact@v4 # v4 is the current stable version for artifacts
        with:
          name: 4G-Workbench-Mac-Installer
          path: 4G_WORKBENCH.dmg