- name: Launch, Automate UI, and Screenshot
        run: |
          echo "Starting the app..."
          # Launch the app in the background
          /Applications/4G_WORKBENCH.app/Contents/MacOS/4G_WORKBENCH > app_errors.txt 2>&1 &
          
          # Give the app time to initialize
          sleep 15

          echo "Running UI Automation via AppleScript..."
          osascript <<EOT
            tell application "System Events"
              tell process "4G_WORKBENCH"
                set frontmost to true
                
                -- 1. Set to Full Screen
                set value of attribute "AXFullScreen" of window 1 to true
                delay 3
                
                -- 2. Select Mode Dropdown (using keyboard navigation)
                -- This assumes 'Mode' is one of the first focusable elements
                keystroke tab
                delay 1
                keystroke (ASCII character 31) -- Down Arrow
                delay 1
                keystroke return
                delay 2

                -- 3. Click the Notes Icon
                -- We use keyboard shortcuts if you've mapped them, or simulated clicks
                -- For this example, we'll use the 'Notes' shortcut if defined (e.g., cmd+n)
                -- Or tab through to the icons
                repeat 5 times
                  keystroke tab
                end repeat
                keystroke return
                delay 3

                -- 4. Click the Reconcile Icon
                keystroke tab
                keystroke return
                delay 3
              end tell
            end tell
EOT

          # Take the final screenshot after automation
          screencapture -x screenshot_automated.png
          
          echo "--- DEBUG: APP OUTPUT/ERRORS ---"
          cat app_errors.txt || echo "No logs found"