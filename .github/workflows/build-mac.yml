name: Build, Package, and Capture UI

on: 
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build-capture:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Pillow is required for the iconphoto handling in main.py 
          pip install pyinstaller pandas numpy openpyxl Pillow 
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run PyInstaller
        run: |
          # Use --icon to set the Finder/Dock icon 
          # Use --add-data with a colon separator for macOS 
          # Ensure app.icns is bundled at the root of the app resources
          pyinstaller main.py \
            --name "4G_WORKBENCH" \
            --windowed \
            --noconfirm \
            --clean \
            --icon="app.icns" \
            --add-data "app.icns:." \
            --add-data "LICENSE.txt:."

      - name: Create .pkg Installer
        run: |
          # Bundle the .app into a standard macOS installer
          pkgbuild --component "dist/4G_WORKBENCH.app" \
            --install-location "/Applications" \
            "dist/4G_WORKBENCH_Installer.pkg"

      - name: Install and Fix Permissions
        run: |
          # Install the pkg to the runner to verify the installation
          sudo installer -pkg "dist/4G_WORKBENCH_Installer.pkg" -target /
          # Bypass Gatekeeper for the automated screenshot tool
          sudo xattr -rd com.apple.quarantine "/Applications/4G_WORKBENCH.app" || true

      - name: Launch, Fullscreen, and Screenshot
        run: |
          echo "Starting the app..."
          # Run the application in the background and capture stderr/stdout for debugging
          /Applications/4G_WORKBENCH.app/Contents/MacOS/4G_WORKBENCH > app_errors.txt 2>&1 &
          
          # Wait time to ensure the GUI is initialized 
          sleep 45
          
          echo "Automating Fullscreen mode via AppleScript..."
          # Use osascript to bring the process to front and trigger fullscreen on window 1
          osascript -e 'tell application "System Events"
            tell process "4G_WORKBENCH"
              set frontmost to true
              delay 2
              try
                set value of attribute "AXFullScreen" of window 1 to true
              on error errText
                log "Error setting fullscreen: " & errText
              end try
            end tell
          end tell'
          
          # Wait for transition animation to finish 
          sleep 10
          
          # Capture the runner's desktop
          screencapture -x screenshot_fullscreen.png
          
          echo "--- DEBUG: APP OUTPUT/ERRORS ---"
          cat app_errors.txt || echo "No logs found"

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: 4G-Workbench-MacOS-Fullscreen
          path: |
            screenshot_fullscreen.png
            dist/4G_WORKBENCH_Installer.pkg
            app_errors.txt
